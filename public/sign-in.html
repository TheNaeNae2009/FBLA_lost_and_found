<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="sign-in-main">
      <div class="side-image">
        <a href="index.html">
          <img src="assets/icons/milton-logo.svg" alt="Milton logo" />
        </a>
      </div>
      <form action="none" class="sign-in-form">
        <h1>Sign In</h1>
        <hr />
        <input type="text" id="email-field" placeholder="Email" />
        <input type="text" id="password-field" placeholder="Password" />
        <button type="submit">Sign in</button>
        <a href="sign-up.html">sign up instead</a>
      </form>
    </main>
  </body>
</html>
