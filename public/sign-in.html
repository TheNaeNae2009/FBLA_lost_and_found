<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="sign-in-main">
      <div class="side-image"></div>
      <form action="none" class="sign-in-form">
        <div>
          <a href="index.html">
            <img src="assets/icons/milton-logo.svg" alt="Milton logo" />
          </a>
          <h1>Sign In</h1>
        </div>
        <hr />
        <input type="text" name="email" id="email-field" placeholder="Email" />
        <input type="text" name="password" id="password-field" placeholder="Password" />
        <button type="submit">Sign in</button>
        <a href="sign-up.html">sign up instead</a>
      </form>
    </main>
    <script src="sign-in.js"></script>
  </body>
</html>
