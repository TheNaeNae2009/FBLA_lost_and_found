<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="sign-up-main">
      <div class="side-image-sign-up"></div>
      <form action="none" class="sign-up-form" id="sign-up-form">
        <div>
          <a href="index.html">
            <img src="assets/icons/milton-logo.svg" alt="Milton logo" />
          </a>
          <h1>Sign Up</h1>
        </div>

        <hr />
        <input type="text" name="name" id="name-field" placeholder="Full Name" />
        <input type="text" name="email" id="email-field" placeholder="Email" />
        <input type="text" name="password" id="password-field" placeholder="Password" />
        <input type="text" name="password-confirm" id="confirm-password-field" placeholder="Confirm Password" />
        <button type="submit">Sign Up</button>
        <a href="sign-in.html">sign in instead</a>
      </form>
    </main>

    <script src="sign-up.js"></script>
  </body>
</html>
