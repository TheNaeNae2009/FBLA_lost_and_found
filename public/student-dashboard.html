<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="icon" href="assets/icons/milton-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dashboard-body">
    <aside class="dashboard-sidebar">
      <a href="index.html" class="index-link">
        <img src="assets/icons/milton-logo.svg" alt="milton logo" class="milton-logo-link" />
        <h1>MHS Lost & Found</h1>
      </a>
      <ul>
        <li><button id="browse-items-button">Browse Items</button></li>
        <li><button id="report-items-button">Report Item</button></li>
      </ul>
    </aside>

    <main class="student-dashboard-main">
      <section class="top-bar">
        <h2>title</h2>
      </section>

      <section class="browse-item-container" id="browse-item-container">
        <div class="searchable-list" id="searchable-list">
          <div class="input-group">
            <input type="text" id="search-input" placeholder="Search..." />
            <img src="assets/icons/search.svg" alt="Search icon" class="search-icon" id="search-icon" />
            <img src="assets/icons/x.svg" alt="Cancel button" class="x-icon" id="x-icon" />
          </div>

          <ul id="list">
          </ul>
        </div>
      </section>

      <section class="listing-info-container" id="listing-info-container">
        <h3 id="listing-title">title</h3>
        <ul id="image-list"></ul>
        <p id="item-date">Date: xx/xx/xxxx</p>
        <p id="item-location">Found: item location</p>
        <p id="item-description">Description: item description</p>
        <button id="claim-item-button">Claim Item</button>
        <button id="back-button">Back</button>
      </section>

      <section class="claim-item-container" id="claim-item-container">
          <form id="claim-item-form" class="claim-item-form">
            <textarea name="description" placeholder="Any questions about the item?" class="claim-description"></textarea>
            <button type="submit">Submit Claim</button>
          </form>
      </section>

      <section class="report-item-container" id="report-item-container">
        <form id="new-item-form" class="new-item-form">
          <input type="text" name="name" placeholder="Item name" />
          <input type="file" name="files" multiple />
          <input type="text" name="dateFound" placeholder="Date found: mm/dd/yyyy" />
          <input type="text" name="location" placeholder="location found" />
          <textarea name="description" placeholder="description..." class="item-description"></textarea>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>
    <script src="student-dashboard.js"></script>
    <script src="main.js"></script>
  </body>
</html>
